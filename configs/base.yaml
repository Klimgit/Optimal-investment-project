paths:
  raw_kaggle: "data/raw/kaggle/Stocks"
  processed_prices: "data/processed/prices.parquet"
  processed_returns: "data/processed/returns.parquet"
  benchmark: "data/processed/spx.parquet"
  features_dir: "data/features"
  predictions_dir: "results/predictions"
  weights_dir: "results/weights"
  pnl_dir: "results/pnl"

dates:
  start: "1995-01-01"
  oos_start: "2010-01-01"
  oos_end: "2017-11-10"

universe:
  top_n: 1500
  min_history_months: 24
  min_price: 5.0

rebalance:
  frequency: "M"
  lag_trading_days: 21

train_window:
  months: 60
  retrain: "from_scratch"
  inner_val_months: 12

features:
  momentum_lookbacks: [1, 3, 6, 12]
  vol_lookback_days: 63
  vol_annualization: 252
  macd_pairs:
    - [8, 24]
    - [16, 48]
    - [32, 96]
    - [64, 192]
    - [12, 26]
    - [5, 35]
    - [10, 30]
    - [20, 60]
  signal_ema_days: 9
  zscore_scope: "cross_section"

target:
  regression: "ex_mean_next_return"
  classification:
    type: "top_bottom_decile"
    top_q: 0.1
    bottom_q: 0.1

portfolio:
  long_quantile: 0.10
  short_quantile: 0.10
  weighting: "equal"
  dollar_neutral: true
  market_neutral: true
  beta_lookback_days: 252

costs:
  per_side_bps: 5.0

seeds: [0, 1, 2, 3, 4]

evaluation:
  trading_days_per_year: 252
  risk_free_rate: 0.0
